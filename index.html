<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f7f6f2">
    <meta
      name="description"
      content="A local-first CISSP cram app for diagnostics, weak-area study, practice questions, flashcards, and exam readiness tracking."
    >
    <title>CISSP Cram</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <noscript>
      <main class="noscript">
        <h1>CISSP Cram needs JavaScript</h1>
        <p>This app stores your progress locally and uses JavaScript for practice, flashcards, and search.</p>
      </main>
    </noscript>
    <div id="app" class="app-loading">
      <div class="loading-card">
        <span class="brand-mark">C</span>
        <span>Loading CISSP Cram...</span>
      </div>
    </div>
    <script src="content.js" defer></script>
    <script src="app.js" defer></script>
  </body>
</html>
