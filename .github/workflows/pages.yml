name: GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static app files
        run: |
          test -f index.html
          test -f styles.css
          test -f content.js
          test -f app.js
          test -f icon.svg
          test -f manifest.webmanifest
          test -f sw.js
          grep -q "CISSP Cram" index.html

      - name: Prepare Pages artifact without EPUB references
        if: github.event_name != 'pull_request'
        run: |
          mkdir _site
          cp index.html styles.css content.js app.js icon.svg manifest.webmanifest sw.js README.md _site/
          touch _site/.nojekyll

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
